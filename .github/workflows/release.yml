name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggert bei Tags wie v1.0.0, v2.1.3, etc.

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install npm dependencies
        run: npm ci

      - name: Install Composer dependencies (with dev)
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: composer run phpstan

      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Build assets
        run: |
          npm run js
          npm run css
          npm run dist-build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          cd dist
          zip -r ../understrap_smj_ulm-${{ steps.version.outputs.version }}.zip understrap_smj_ulm/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: understrap_smj_ulm-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
